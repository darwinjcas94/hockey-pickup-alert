name: Check Pickup Dates

on:
  schedule:
    - cron: "*/15 * * * *"

  workflow_dispatch:

  push:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore known dates
        run: |
          if [ ! -f known_dates.json ]; then
            echo "[]" > known_dates.json
          fi

      - name: Run checker
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python pickup_alert.py

      - name: Commit updated known dates
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add known_dates.json

          git diff --cached --quiet || git commit -m "Update known dates"

          git push
